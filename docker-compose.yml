# 博客系统 Docker Compose 配置
#
# 三个服务：
#   nginx    - 反向代理（端口 80），统一入口
#   backend  - NestJS 后端（内部端口 4000）
#   frontend - Next.js 前端（内部端口 3000）
#
# 使用方法：
#   docker compose up -d        # 启动所有服务
#   docker compose logs -f      # 查看日志
#   docker compose down         # 停止所有服务
#   docker compose up -d --build # 重新构建并启动

services:
  # ========== 反向代理 ==========
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/usr/share/nginx/uploads:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ========== 后端 ==========
  backend:
    build: ./server
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=file:/app/data/dev.db
      - JWT_SECRET=${JWT_SECRET:-change-this-secret}
      - UPLOAD_DIR=/app/uploads
    volumes:
      # 数据库持久化（bind mount，方便备份）
      - ./data:/app/data
      # 上传图片共享卷（backend 写，nginx 读）
      - uploads:/app/uploads
    restart: unless-stopped

  # ========== 前端 ==========
  frontend:
    build:
      context: ./frontend
      args:
        # 构建时注入的公共环境变量（NEXT_PUBLIC_* 在 build 阶段内联到代码）
        - NEXT_PUBLIC_API_URL=http://${SERVER_IP:-localhost}/api
        - NEXT_PUBLIC_SITE_URL=http://${SERVER_IP:-localhost}
    environment:
      - PORT=3000
      # 服务端渲染时直接访问后端（不走 Nginx，Docker 内部网络更快）
      - API_INTERNAL_URL=http://backend:4000
    depends_on:
      - backend
    restart: unless-stopped

# 共享卷
volumes:
  uploads:
